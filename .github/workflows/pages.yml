# Deploys the download page to GitHub Pages. Synced automatically into
# TextToSpeed-releases by the private repo's build workflow — edit the copy
# in TextToSpeed/public-site/, not the one in TextToSpeed-releases.
name: Deploy download page

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # enablement: true provisions GitHub Pages on first run,
      # so no manual settings toggle is needed
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
